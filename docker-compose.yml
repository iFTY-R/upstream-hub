services:
  postgres:
    image: postgres:16-alpine
    container_name: upstreamhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-upstreamhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-upstreamhub}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-upstreamhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # 本仓库是二开版，默认从当前源码构建（build 块），镜像名用本仓库自己的命名空间，
    # 避免误拉原作者 ghcr.io/worryzyy 的预构建镜像（那里没有本仓库的二开改动）。
    # 强制重建：`docker compose up -d --build`（推荐用 ./scripts/deploy.sh）。
    image: upstream-hub:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: upstreamhub
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      UPSTREAMHUB_SERVER_PORT: 8418
      UPSTREAMHUB_DATABASE_HOST: postgres
      UPSTREAMHUB_DATABASE_PORT: 5432
      UPSTREAMHUB_DATABASE_USER: ${POSTGRES_USER:-upstreamhub}
      UPSTREAMHUB_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      UPSTREAMHUB_DATABASE_NAME: ${POSTGRES_DB:-upstreamhub}
      UPSTREAMHUB_SERVER_MODE: ${UPSTREAMHUB_SERVER_MODE:-release}
      UPSTREAMHUB_LOG_LEVEL: ${UPSTREAMHUB_LOG_LEVEL:-info}
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required, set it in .env}
      # 鉴权默认开启。默认账号 admin/admin 首次登录强制改密；ADMIN_PASSWORD 填了则用它且无需改密。
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-}
    ports:
      - "${UPSTREAMHUB_HTTP_PORT:-8080}:8418"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8418/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
